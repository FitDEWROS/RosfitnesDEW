<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RosApp — Упражнения</title>

  <!-- ✅ Единое подключение общей темы -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@500;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
  <script src="env.js?v=20260115"></script>
</head>

<body>
  <div class="wrap">
    <header class="header header--split">
      <button id="btnBackNav" class="back-btn" type="button">Назад</button>
      <div class="view-toggle" role="tablist" aria-label="Вид страницы">
        <button class="view-toggle-btn is-active" data-view="map" role="tab" aria-selected="true">Силуэт</button>
        <button class="view-toggle-btn" data-view="list" role="tab" aria-selected="false">Список</button>
      </div>
    </header>

    <main class="muscle-wrap" aria-live="polite">
      <div id="mapView" class="map-view">
        <div class="view-switch" role="tablist" aria-label="Выбор вида тела">
          <button id="btnFront" class="active" role="tab" aria-selected="true">Вид спереди</button>
          <button id="btnBack" role="tab" aria-selected="false">Вид сзади</button>
          <button id="btnDebug" class="debug-toggle">Режим отладки</button>
        </div>

        <div id="frontView" class="canvas" style="display:block">
          <object id="svgFront" class="svg-host" type="image/svg+xml" data="front.svg"></object>
        </div>

        <div id="backView" class="canvas" style="display:none">
          <object id="svgBack" class="svg-host" type="image/svg+xml" data="back.svg"></object>
        </div>

        <section id="info" class="info" aria-live="polite">
          <h3>Выбери мышцу</h3>
          <p class="legend">Нажми на область на силуэте, чтобы увидеть упражнения.</p>
        </section>
      </div>

      <section id="listView" class="exercise-list-view" hidden>
                        <div class="list-head">
          <div class="list-title-group">
            <span class="header-eyebrow">Упражнения</span>
            <h3 class="list-title">Зал</h3>
          </div>
          <span class="muted list-subtitle">Каталог упражнений</span>
        </div>
        <div class="exercise-list" id="exerciseList"></div>
        <div class="empty-state" id="exerciseEmpty" hidden>Пока нет упражнений.</div>
      </section>
    </main>
  </div>

  <div id="videoModal" class="modal" aria-hidden="true">
    <div class="video-modal" role="dialog" aria-modal="true">
      <button class="fullscreen-btn" id="fullscreenVideo" type="button" aria-label="Полный экран">⛶</button>
      <button class="modal-close" id="closeVideo" type="button" aria-label="Закрыть">&times;</button>
      <video id="exerciseVideo" controls playsinline></video>
      <h3 class="video-title" id="videoTitle"></h3>
      <div class="video-desc" id="videoDesc"></div>
      <p class="video-note" id="videoNote">Видео пока не добавлено.</p>
    </div>
  </div>

  <script>
    /* === 🌗 Тема === */
    (function() {
      const savedTheme = localStorage.getItem("theme") || "dark";
      document.documentElement.classList.toggle("light", savedTheme === "light");
    })();

    /* === 🔙 Назад === */
    document.getElementById("btnBackNav").addEventListener("click", () => {
      window.location.href = "index.html";
    });

    window.addEventListener("popstate", () => window.location.href = "index.html");
    history.pushState({ page: "exercises" }, "", window.location.href);

    const API_BASE = window.ENV?.API_BASE || "";
    const apiBase = API_BASE ? API_BASE.replace(/\/$/, "") : "";
    const mapView = document.getElementById("mapView");
    const listView = document.getElementById("listView");
    const viewButtons = document.querySelectorAll("[data-view]");
    const exerciseList = document.getElementById("exerciseList");
    const exerciseEmpty = document.getElementById("exerciseEmpty");
    const videoModal = document.getElementById("videoModal");
    const videoEl = document.getElementById("exerciseVideo");
    const videoTitle = document.getElementById("videoTitle");
    const videoDesc = document.getElementById("videoDesc");
    const videoNote = document.getElementById("videoNote");
    const fullscreenBtn = document.getElementById("fullscreenVideo");
    const closeVideo = document.getElementById("closeVideo");

    /* === ⚙️ Основная логика === */
    const btnFront = document.getElementById('btnFront');
    const btnBack  = document.getElementById('btnBack');
    const btnDebug = document.getElementById('btnDebug');
    const front    = document.getElementById('frontView');
    const back     = document.getElementById('backView');
    const info     = document.getElementById('info');

    let debugMode = false;
    let exerciseLibrary = [];
    let lastGroup = null;
    let currentVideoRequest = 0;

    btnDebug.onclick = () => {
      debugMode = !debugMode;
      btnDebug.classList.toggle("active", debugMode);
      btnDebug.textContent = debugMode ? "Отладка: ВКЛ" : "Режим отладки";
    };

    function setView(isFront){
      front.style.display = isFront ? "block" : "none";
      back.style.display  = isFront ? "none" : "block";
      btnFront.classList.toggle('active', isFront);
      btnBack.classList.toggle('active', !isFront);
      btnFront.setAttribute('aria-selected', String(isFront));
      btnBack.setAttribute('aria-selected', String(!isFront));
      info.innerHTML = `<h3>Выбери мышцу</h3>
        <p class="legend">Нажми на область на силуэте, чтобы увидеть упражнения.</p>`;
    }

    btnFront.onclick = () => setView(true);
    btnBack.onclick  = () => setView(false);

    const muscleKeywords = {
      abs: ["пресс", "скруч", "планк", "кор"],
      chest: ["жим", "груд", "отжим", "сведение"],
      biceps: ["бицепс", "сгиб", "подъем", "подъём"],
      delts: ["плеч", "дельт", "жим гант", "развод"],
      forearm: ["предплеч", "кист"],
      obliques: ["кос", "вращ", "русск"],
      quads: ["квадриц", "присед", "выпад", "жим ног"],
      calves: ["икр", "носок"],
      traps: ["трап", "шраг"],
      rearDelts: ["задн", "развод", "тяг", "лицу"],
      lats: ["широч", "тяга", "подтяг"],
      triceps: ["трицепс", "разгиб", "француз"],
      erectors: ["разгиб", "гиперэкст"],
      glutes: ["ягод", "мост", "таз"],
      hams: ["бедр", "румын", "сгиб"],
      adductors: ["привод", "сведение"],
      hipFlexors: ["сгиб", "бедра"],
      tibialis: ["берц", "носк"]
    };

    const GROUPS = {
      abs: ["abs-1","abs-2","abs-3","abs-4","abs-5","abs-6","abs-7","abs-8"],
      chest: ["chest-1","chest-2"],
      biceps: ["biceps-left-1","biceps-left-2","biceps-right-1","biceps-right-2"],
      delts: ["delts-left","delts-right"],
      forearm: ["forearm-left-1","forearm-left-2","forearm-left-3","forearm-right-1","forearm-right-2","forearm-right-3"],
      obliques: ["obliques-left-1","obliques-left-2","obliques-left-3","obliques-left-4","obliques-left-5",
                 "obliques-right-1","obliques-right-2","obliques-right-3","obliques-right-4","obliques-right-5"],
      quads: ["quads-left","quads-right"],
      calves: ["calves-left","calves-right"],
      triceps: ["triceps-left","triceps-right"],
      rearDelts: ["rear-delts-left","rear-delts-right"],
      lats: ["lats-left","lats-right"],
      glutes: ["glutes-left","glutes-right"],
      hams: ["hams-left","hams-right"],
      traps: ["traps"],
      erectors: ["erectors"],
      adductors: ["adductors-left","adductors-right"],
      hipFlexors: ["hip-flexors-left","hip-flexors-right"],
      tibialis: ["tibialis-left","tibialis-right"]
    };

    function findGroup(id){
      for (let key in GROUPS){
        if (GROUPS[key].includes(id)) return key;
      }
      return null;
    }

    const getExercisesForGroup = (groupKey) => {
      const keywords = muscleKeywords[groupKey] || [];
      if (!keywords.length || !exerciseLibrary.length) return ["Нет упражнений"];
      const results = exerciseLibrary.filter((exercise) => {
        const haystack = `${exercise.title || ""} ${exercise.description || ""}`.toLowerCase();
        return keywords.some((word) => haystack.includes(word));
      });
      if (!results.length) return ["Нет упражнений"];
      return results.map((exercise) => exercise.title || "Упражнение");
    };

    function attachHandlers(obj){
      obj.addEventListener("load", () => {
        const svgDoc = obj.contentDocument || obj.getSVGDocument();
        if (!svgDoc) return;

        Object.values(GROUPS).flat().forEach(id => {
          const el = svgDoc.getElementById(id);
          if (el) el.classList.add('muscle');
        });

        svgDoc.querySelectorAll("path").forEach((el, idx) => {
          if (!el.id) el.id = "auto-path-" + idx;

          el.addEventListener("pointerdown", () => {
            svgDoc.querySelectorAll(".muscle.active, .muscle-test")
                  .forEach(m => m.classList.remove("active","muscle-test"));

            const groupKey = findGroup(el.id);

            if (debugMode) {
              const list = groupKey ? GROUPS[groupKey] : [el.id];
              list.forEach(gid => {
                const g = svgDoc.getElementById(gid);
                if (!g) return;
                g.classList.add("muscle-test");
                const d = g.getAttribute("d") || "";
                const match = d.match(/M\s*([0-9.\-]+),\s*([0-9.\-]+)/i);
                const coords = match ? `X=${match[1]}, Y=${match[2]}` : "не найдены";
                alert(`Мышца: ${gid}\n${coords}`);
              });
              return;
            }

            if (groupKey) {
              lastGroup = groupKey;
              GROUPS[groupKey].forEach(gid => {
                const g = svgDoc.getElementById(gid);
                if (g) g.classList.add("active");
              });
              const list = getExercisesForGroup(groupKey);
              info.innerHTML = `<h3>${humanName(groupKey)}</h3><ul>${list.map(x=>`<li>${x}</li>`).join('')}</ul>`;
            }
          });
        });
      });
    }

    attachHandlers(document.getElementById("svgFront"));
    attachHandlers(document.getElementById("svgBack"));

    function humanName(key){
      const map = {
        chest:"Грудь", abs:"Пресс",
        biceps:"Бицепсы", delts:"Дельты",
        forearm:"Предплечья", obliques:"Косые",
        quads:"Квадрицепсы", calves:"Икры",
        traps:"Трапеции", rearDelts:"Задние дельты",
        lats:"Широчайшие", triceps:"Трицепсы",
        erectors:"Разгибатели спины",
        glutes:"Ягодицы", hams:"Бицепсы бедра",
        adductors:"Приводящие", hipFlexors:"Сгибатели бедра",
        tibialis:"Большеберцовые"
      };
      return map[key] || key;
    }

    const renderExerciseList = (items) => {
      if (!exerciseList) return;
      exerciseList.innerHTML = "";
      if (!items.length) {
        if (exerciseEmpty) exerciseEmpty.hidden = false;
        return;
      }
      if (exerciseEmpty) exerciseEmpty.hidden = true;
      items.forEach((exercise, i) => {
        const card = document.createElement("button");
        card.type = "button";
        card.className = "exercise-card";
        const letter = (exercise.title || "У").slice(0, 1);
        const hasVideo = Boolean(exercise.videoUrl);
        const previewUrl = exercise.videoUrl && !isYandexPublicLink(exercise.videoUrl) ? exercise.videoUrl : "";
        card.innerHTML = `
          <div class="thumb">
            <div class="thumb-placeholder">${letter}</div>
            <video class="thumb-video" muted playsinline preload="metadata"></video>
            <div class="thumb-overlay"><span class="play-icon">&#9654;</span></div>
            <span class="thumb-chip">${hasVideo ? "Видео" : "Без видео"}</span>
          </div>
          <div class="card-body">
            <h3>${exercise.title || "Упражнение"}</h3>
            <div class="card-hint">Открыть описание</div>
          </div>
        `;
        const previewEl = card.querySelector(".thumb-video");
        if (previewEl && previewUrl) {
          previewEl.src = previewUrl;
          previewEl.addEventListener("loadeddata", () => {
            card.classList.add("has-preview");
          });
          previewEl.addEventListener("error", () => {
            previewEl.removeAttribute("src");
          });
        } else if (previewEl) {
          previewEl.remove();
        }
        card.addEventListener("click", () => openVideo(exercise));
        exerciseList.appendChild(card);
        setTimeout(() => {
          card.style.opacity = 1;
          card.style.transform = "translateY(0)";
        }, 90 * i);
      });
    };

    const loadExercises = async () => {
      if (!apiBase) return;
      try {
        const res = await fetch(`${apiBase}/api/exercises`);
        const json = await res.json().catch(() => ({}));
        if (!json?.ok || !Array.isArray(json.exercises)) return;
        exerciseLibrary = json.exercises;
        renderExerciseList(exerciseLibrary);
        if (lastGroup) {
          info.innerHTML = `<h3>${humanName(lastGroup)}</h3><ul>${getExercisesForGroup(lastGroup).map(x=>`<li>${x}</li>`).join('')}</ul>`;
        }
      } catch (err) {
        console.warn("exercises load failed", err);
      }
    };

    const isYandexPublicLink = (url) => {
      try {
        const host = new URL(url).hostname;
        return host === "disk.yandex.ru" || host === "yadi.sk" || host.endsWith(".yandex.ru");
      } catch (_) {
        return false;
      }
    };

    const resolveVideoUrl = async (url) => {
      if (!url) return null;
      if (!isYandexPublicLink(url)) return url;
      try {
        const res = await fetch(`${apiBase}/api/yadisk/resolve?publicUrl=${encodeURIComponent(url)}`);
        const json = await res.json().catch(() => ({}));
        if (json?.ok && json.href) return json.href;
      } catch (err) {
        console.warn("Yandex resolve failed:", err);
      }
      return null;
    };

        const showVideoLink = (href, message) => {
      if (!videoNote) return;
      videoNote.innerHTML = "";
      if (message) {
        const text = document.createElement("span");
        text.textContent = message;
        videoNote.appendChild(text);
        videoNote.appendChild(document.createElement("br"));
      }
      const link = document.createElement("a");
      link.href = href;
      link.target = "_blank";
      link.rel = "noopener";
      link.className = "video-link";
      link.textContent = "Открыть видео";
      videoNote.appendChild(link);
    };

    const escapeHtml = (value) => (
      String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;")
    );

    const formatText = (value) => escapeHtml(value).replace(/\n/g, "<br>");

    const splitDescription = (raw) => {
      const text = String(raw || "").replace(/\r\n/g, "\n").trim();
      if (!text) return { how: "", tip: "" };
      const tipRegex = /(?:^|\n)\s*Совет\s*:/i;
      const tipMatch = text.match(tipRegex);
      let how = text;
      let tip = "";
      if (tipMatch && typeof tipMatch.index === "number") {
        how = text.slice(0, tipMatch.index);
        tip = text.slice(tipMatch.index).replace(tipRegex, "");
      }
      how = how.replace(/Как\s+выполнять\s*:/i, "").trim();
      tip = tip.replace(/Совет\s*:/i, "").trim();
      if (!how && !tip) {
        how = text;
      }
      return { how, tip };
    };

    const buildDescriptionHtml = (raw) => {
      const sections = splitDescription(raw);
      const howText = sections.how || raw || "-";
      const tipText = sections.tip || "-";
      return `
        <div class="desc-block">
          <strong>Как выполнять:</strong>
          <div>${formatText(howText)}</div>
        </div>
        <div class="desc-block">
          <strong>Совет:</strong>
          <div>${formatText(tipText)}</div>
        </div>
      `;
    };

    const openVideo = async (exercise) => {
      if (!videoModal) return;
      currentVideoRequest += 1;
      const requestId = currentVideoRequest;
      if (videoTitle) videoTitle.textContent = exercise?.title || "Упражнение";
      if (videoDesc) {
        videoDesc.innerHTML = buildDescriptionHtml(exercise?.description || "");
      }
      if (videoEl) {
        videoEl.pause();
        videoEl.removeAttribute("src");
        videoEl.style.display = "none";
      }
      if (videoNote) {
        videoNote.style.display = "block";
        videoNote.textContent = "Загружаем видео...";
      }

      videoModal.classList.add("show");
      videoModal.setAttribute("aria-hidden", "false");

      if (!exercise?.videoUrl) {
        if (videoNote) videoNote.textContent = "Видео пока не добавлено.";
        return;
      }

      const resolvedUrl = await resolveVideoUrl(exercise.videoUrl);
      if (requestId !== currentVideoRequest) return;

      if (resolvedUrl && videoEl) {
        videoEl.src = resolvedUrl;
        videoEl.style.display = "block";
        videoEl.onerror = () => {
          if (requestId !== currentVideoRequest) return;
          showVideoLink(resolvedUrl, "Видео не воспроизводится в приложении.");
        };
        videoEl.onloadeddata = () => {
          if (requestId !== currentVideoRequest) return;
          if (videoNote) videoNote.style.display = "none";
        };
        videoEl.load();
        const playAttempt = videoEl.play();
        if (playAttempt && typeof playAttempt.catch === "function") {
          playAttempt.catch(() => {
            if (requestId !== currentVideoRequest) return;
            showVideoLink(resolvedUrl, "Не удалось запустить видео.");
          });
        }
      } else {
        showVideoLink(exercise.videoUrl, "Не удалось загрузить видео.");
      }
    };
    const closeVideoModal = () => {
      if (!videoModal) return;
      currentVideoRequest += 1;
      videoModal.classList.remove("show");
      videoModal.setAttribute("aria-hidden", "true");
      if (videoEl) {
        videoEl.pause();
        videoEl.removeAttribute("src");
      }
    };

    if (closeVideo) closeVideo.addEventListener("click", closeVideoModal);
    if (videoModal) {
      videoModal.addEventListener("click", (e) => {
        if (e.target === videoModal) closeVideoModal();
      });
    }

    const setViewMode = (mode) => {
      const isList = mode === "list";
      if (mapView) {
        mapView.hidden = isList;
        mapView.classList.toggle("is-hidden", isList);
        mapView.setAttribute("aria-hidden", isList ? "true" : "false");
      }
      if (listView) {
        listView.hidden = !isList;
        listView.classList.toggle("is-hidden", !isList);
        listView.setAttribute("aria-hidden", isList ? "false" : "true");
      }
      viewButtons.forEach((btn) => {
        const active = btn.dataset.view === mode;
        btn.classList.toggle("is-active", active);
        btn.setAttribute("aria-selected", active ? "true" : "false");
      });
      localStorage.setItem("exercise_view", mode);
    };

    viewButtons.forEach((btn) => {
      btn.addEventListener("click", () => {
        const mode = btn.dataset.view;
        setViewMode(mode);
      });
    });

    const savedView = localStorage.getItem("exercise_view") || "map";
    setViewMode(savedView);
    loadExercises();
  </script>
</body>
</html>
