<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Раздел: Упражнения</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .page-title { margin: 12px 16px 0; font-size: clamp(22px, 5vw, 36px); }
    .muscle-wrap { display:flex; flex-direction:column; align-items:center; gap:18px; padding:10px 16px 80px; }
    .view-switch { display:flex; gap:8px; flex-wrap:wrap; }
    .view-switch button{
      background: var(--card); color: var(--text);
      border:1px solid var(--card-border); border-radius: 10px;
      padding:8px 12px; cursor:pointer;
    }
    .view-switch button.active{ outline:2px solid var(--accent); }

    .canvas {
      width: 100%;
      height: 80vh;
      max-width: 640px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .svg-host {
      height: 100%;
      width: auto;
      display: block;
    }

    .muscle:hover { fill: rgba(139,92,246,0.25); stroke:#8b5cf6; stroke-width:2; }
    .muscle.active { fill: rgba(139,92,246,0.55); stroke:#8b5cf6; stroke-width:2; cursor: pointer; }
    .muscle { transition: fill .3s, stroke .3s; stroke: transparent; stroke-width: 20px; pointer-events: auto; }

    .muscle-test { fill: red !important; opacity: 0.5; }

    .info {
      position: sticky; bottom: 16px; max-width: 560px;
      width: calc(100% - 32px);
      background: var(--card); border:1px solid var(--card-border);
      border-radius:16px; padding:14px 16px; color:var(--text);
      box-shadow: 0 6px 26px rgba(0,0,0,.35);
    }
    .info h3{ margin:0 0 6px; color: var(--accent); font-size: 18px; }
    .info ul{ margin:0; padding-left:18px; }
    .legend { opacity:.75; font-size: 12px; margin-top:6px; }

    .debug-toggle {
      margin: 6px;
      padding:6px 10px;
      border:1px solid var(--card-border);
      border-radius:8px;
      cursor:pointer;
      background: var(--card);
      color: var(--text);
    }
    .debug-toggle.active { outline:2px solid crimson; color: crimson; }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="header">
      <button id="btnBackNav" class="nav-btn">← Назад</button>
      <h1 class="page-title">Раздел: Упражнения</h1>
      <button id="btnTheme" class="theme-btn">🌓</button>
    </header>

    <main class="muscle-wrap" aria-live="polite">
      <div class="view-switch" role="tablist" aria-label="Выбор вида тела">
        <button id="btnFront" class="active" role="tab" aria-selected="true">Вид спереди</button>
        <button id="btnBack" role="tab" aria-selected="false">Вид сзади</button>
        <button id="btnDebug" class="debug-toggle">Режим отладки</button>
      </div>

      <div id="frontView" class="canvas" style="display:block">
        <object id="svgFront" class="svg-host" type="image/svg+xml" data="front.svg"></object>
      </div>

      <div id="backView" class="canvas" style="display:none">
        <object id="svgBack" class="svg-host" type="image/svg+xml" data="back.svg"></object>
      </div>

      <section id="info" class="info" aria-live="polite">
        <h3>Выбери мышцу</h3>
        <p class="legend">Нажми на область на силуэте, чтобы увидеть упражнения.</p>
      </section>
    </main>
  </div>

  <script>
    const btnFront = document.getElementById('btnFront');
    const btnBack  = document.getElementById('btnBack');
    const btnDebug = document.getElementById('btnDebug');
    const front    = document.getElementById('frontView');
    const back     = document.getElementById('backView');
    const info     = document.getElementById('info');

    let debugMode = false;

    btnDebug.onclick = () => {
      debugMode = !debugMode;
      btnDebug.classList.toggle("active", debugMode);
      btnDebug.textContent = debugMode ? "Отладка: ВКЛ" : "Режим отладки";
    };

    function setView(isFront){
      front.style.display = isFront ? "block" : "none";
      back.style.display  = isFront ? "none" : "block";

      btnFront.classList.toggle('active', isFront);
      btnBack.classList.toggle('active', !isFront);
      btnFront.setAttribute('aria-selected', String(isFront));
      btnBack.setAttribute('aria-selected', String(!isFront));

      info.innerHTML = `<h3>Выбери мышцу</h3>
        <p class="legend">Нажми на область на силуэте, чтобы увидеть упражнения.</p>`;
    }

    btnFront.onclick = () => setView(true);
    btnBack.onclick  = () => setView(false);

    const DB = {
      abs:['Скручивания','Подъём ног в висе','Планка'],
      chest:['Жим лёжа','Отжимания','Сведение рук в тренажёре'],
      biceps:['Подъём штанги на бицепс','Гантели сидя'],
      delts:['Жим гантелей сидя','Разводка гантелей стоя'],
      forearm:['Сгибания кистей со штангой','Обратные сгибания'],
      obliques:['Русские скручивания','Боковая планка'],
      quads:['Приседания','Выпады','Жим ногами'],
      calves:['Подъёмы на носки стоя','Подъёмы сидя'],
      traps:['Шраги','Тяга к подбородку'],
      rearDelts:['Обратная разводка','Тяга к лицу'],
      lats:['Тяга блока','Тяга в наклоне'],
      triceps:['Французский жим','Разгибания на блоке'],
      erectors:['Гиперэкстензия','Тяга с пола'],
      glutes:['Ягодичный мост','Румынская тяга'],
      hams:['Сгибания ног лёжа','Тяга румынская'],
      adductors:['Сведение ног в тренажёре'],
      hipFlexors:['Подъём прямых ног лёжа'],
      tibialis:['Подъёмы носков сидя']
    };

    const GROUPS = {
      abs: ["abs-1","abs-2","abs-3","abs-4","abs-5","abs-6","abs-7","abs-8"],
      chest: ["chest-1","chest-2"],
      biceps: ["biceps-left-1","biceps-left-2","biceps-right-1","biceps-right-2"],
      delts: ["delts-left","delts-right"],
      forearm: ["forearm-left-1","forearm-left-2","forearm-left-3","forearm-right-1","forearm-right-2","forearm-right-3"],
      obliques: ["obliques-left-1","obliques-left-2","obliques-left-3","obliques-left-4","obliques-left-5",
                 "obliques-right-1","obliques-right-2","obliques-right-3","obliques-right-4","obliques-right-5"],
      quads: ["quads-left","quads-right"],
      calves: ["calves-left","calves-right"],
      triceps: ["triceps-left","triceps-right"],
      rearDelts: ["rear-delts-left","rear-delts-right"],
      lats: ["lats-left","lats-right"],
      glutes: ["glutes-left","glutes-right"],
      hams: ["hams-left","hams-right"],
      traps: ["traps"],
      erectors: ["erectors"],
      adductors: ["adductors-left","adductors-right"],
      hipFlexors: ["hip-flexors-left","hip-flexors-right"],
      tibialis: ["tibialis-left","tibialis-right"]
    };

    function findGroup(id){
      for (let key in GROUPS){
        if (GROUPS[key].includes(id)) return key;
      }
      return null;
    }

    function attachHandlers(obj){
      obj.addEventListener("load", () => {
        const svgDoc = obj.contentDocument || obj.getSVGDocument();
        if (!svgDoc) return;

        const svgRoot = svgDoc.querySelector("svg");
        if (!svgRoot) return;

        Object.values(GROUPS).flat().forEach(id => {
          const el = svgDoc.getElementById(id);
          if (el) el.classList.add('muscle');
        });

        svgDoc.querySelectorAll("path").forEach((el, idx) => {
          if (!el.id) {
            el.id = "auto-path-" + idx;
          }

          el.addEventListener("pointerdown", () => {
            svgDoc.querySelectorAll(".muscle.active, .muscle-test").forEach(m => m.classList.remove("active","muscle-test"));

            const groupKey = findGroup(el.id);

            if (debugMode) {
              if (groupKey) {
                GROUPS[groupKey].forEach(gid => {
                  const g = svgDoc.getElementById(gid);
                  if (g) {
                    g.classList.add("muscle-test");
                    const d = g.getAttribute("d") || "";
                    const match = d.match(/M\s*([0-9.\-]+),\s*([0-9.\-]+)/i);
                    const coords = match ? `X=${match[1]}, Y=${match[2]}` : "не найдены";
                    console.log(`Мышца: ${gid}, координаты: ${coords}`);
                    alert(`Мышца: ${gid}\n${coords}`);
                  }
                });
              } else {
                el.classList.add("muscle-test");
                const d = el.getAttribute("d") || "";
                const match = d.match(/M\s*([0-9.\-]+),\s*([0-9.\-]+)/i);
                const coords = match ? `X=${match[1]}, Y=${match[2]}` : "не найдены";
                console.log(`Путь: ${el.id}, координаты: ${coords}`);
                alert(`Путь: ${el.id}\n${coords}`);
              }
              return;
            }

            if (groupKey) {
              GROUPS[groupKey].forEach(gid => {
                const g = svgDoc.getElementById(gid);
                if (g) g.classList.add("active");
              });
              const list = DB[groupKey] && DB[groupKey].length ? DB[groupKey] : ['Нет упражнений'];
              info.innerHTML = `<h3>${humanName(groupKey)}</h3><ul>${list.map(x=>`<li>${x}</li>`).join('')}</ul>`;
            }
          });
        });
      });
    }

    attachHandlers(document.getElementById("svgFront"));
    attachHandlers(document.getElementById("svgBack"));

    function humanName(key){
      const map = {
        chest:"Грудь", abs:"Пресс",
        biceps:"Бицепсы", delts:"Дельты",
        forearm:"Предплечья", obliques:"Косые",
        quads:"Квадрицепсы", calves:"Икры",
        traps:"Трапеции", rearDelts:"Задние дельты",
        lats:"Широчайшие", triceps:"Трицепсы",
        erectors:"Разгибатели спины",
        glutes:"Ягодицы", hams:"Бицепсы бедра",
        adductors:"Приводящие", hipFlexors:"Сгибатели бедра",
        tibialis:"Большеберцовые"
      };
      return map[key] || key;
    }
  </script>
</body>
</html>
