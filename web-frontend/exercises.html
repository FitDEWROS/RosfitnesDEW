<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Раздел: Упражнения</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .page-title { margin: 12px 16px 0; font-size: clamp(22px, 5vw, 36px); }
    .muscle-wrap { display:flex; flex-direction:column; align-items:center; gap:18px; padding:10px 16px 80px; }
    .view-switch { display:flex; gap:8px; flex-wrap:wrap; }
    .view-switch button{
      background: var(--card); color: var(--text);
      border:1px solid var(--card-border); border-radius: 10px;
      padding:8px 12px; cursor:pointer;
    }
    .view-switch button.active{ outline:2px solid var(--accent); }

    /* Адаптивный контейнер */
    .canvas {
      width: 100%;
      height: 80vh;
      max-width: 640px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .svg-host {
      height: 100%;
      width: auto;
      display: block;
    }

    /* Подсветка при наведении */
    .muscle:hover { fill: rgba(139,92,246,0.25); stroke:#8b5cf6; stroke-width:2; }

    /* Подсветка выбранной мышцы */
    .muscle.active { fill: rgba(139,92,246,0.55); stroke:#8b5cf6; stroke-width:2; cursor: pointer; }

    /* Невидимая «подушка» клика */
    .muscle { transition: fill .3s, stroke .3s; stroke: transparent; stroke-width: 20px; pointer-events: auto; }

    /* 🔧 Отладка */
    .muscle-test { fill: red !important; opacity: 0.5; }

    .info {
      position: sticky; bottom: 16px; max-width: 560px;
      width: calc(100% - 32px);
      background: var(--card); border:1px solid var(--card-border);
      border-radius:16px; padding:14px 16px; color:var(--text);
      box-shadow: 0 6px 26px rgba(0,0,0,.35);
    }
    .info h3{ margin:0 0 6px; color: var(--accent); font-size: 18px; }
    .info ul{ margin:0; padding-left:18px; }
    .legend { opacity:.75; font-size: 12px; margin-top:6px; }

    .debug-toggle {
      margin: 6px;
      padding:6px 10px;
      border:1px solid var(--card-border);
      border-radius:8px;
      cursor:pointer;
      background: var(--card);
      color: var(--text);
    }
    .debug-toggle.active { outline:2px solid crimson; color: crimson; }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="header">
      <h1 class="page-title">Раздел: Упражнения</h1>
    </header>

    <main class="muscle-wrap" aria-live="polite">
      <div class="view-switch" role="tablist" aria-label="Выбор вида тела">
        <button id="btnFront" class="active" role="tab" aria-selected="true">Вид спереди</button>
        <button id="btnBack" role="tab" aria-selected="false">Вид сзади</button>
        <button id="btnDebug" class="debug-toggle">Режим отладки</button>
      </div>

      <!-- ====== ВИД СПЕРЕДИ ====== -->
      <div id="frontView" class="canvas" style="display:block">
        <object id="svgFront" class="svg-host" type="image/svg+xml" data="front.svg"></object>
      </div>

      <!-- ====== ВИД СЗАДИ ====== -->
      <div id="backView" class="canvas" style="display:none">
        <object id="svgBack" class="svg-host" type="image/svg+xml" data="back.svg"></object>
      </div>

      <section id="info" class="info" aria-live="polite">
        <h3>Выбери мышцу</h3>
        <p class="legend">Нажми на область на силуэте, чтобы увидеть упражнения.</p>
      </section>
    </main>
  </div>

  <script>
    const btnFront = document.getElementById('btnFront');
    const btnBack  = document.getElementById('btnBack');
    const btnDebug = document.getElementById('btnDebug');
    const front    = document.getElementById('frontView');
    const back     = document.getElementById('backView');
    const info     = document.getElementById('info');

    let debugMode = false;

    btnDebug.onclick = () => {
      debugMode = !debugMode;
      btnDebug.classList.toggle("active", debugMode);
      btnDebug.textContent = debugMode ? "Отладка: ВКЛ" : "Режим отладки";
    };

    function setView(isFront){
      front.style.display = isFront ? "block" : "none";
      back.style.display  = isFront ? "none" : "block";

      btnFront.classList.toggle('active', isFront);
      btnBack.classList.toggle('active', !isFront);
      btnFront.setAttribute('aria-selected', String(isFront));
      btnBack.setAttribute('aria-selected', String(!isFront));

      info.innerHTML = `<h3>Выбери мышцу</h3>
        <p class="legend">Нажми на область на силуэте, чтобы увидеть упражнения.</p>`;
    }

    btnFront.onclick = () => setView(true);
    btnBack.onclick  = () => setView(false);

    // ===== Упражнения по мышцам =====
    const DB = {
      chest:['Жим лёжа','Отжимания','Сведение рук в тренажёре'],
      abs:['Скручивания','Подъём ног в висе','Планка'],
      'biceps-left':['Подъём штанги на бицепс','Гантели сидя'],
      'biceps-right':['Подъём штанги на бицепс','Гантели сидя'],
      'delts-left':['Жим гантелей сидя','Разводка гантелей стоя'],
      'delts-right':['Жим гантелей сидя','Разводка гантелей стоя'],
      'forearm-left':['Сгибания кистей со штангой','Обратные сгибания'],
      'forearm-right':['Сгибания кистей со штангой','Обратные сгибания'],
      'obliques-left':['Русские скручивания','Боковая планка'],
      'obliques-right':['Русские скручивания','Боковая планка'],
      'quads-left':['Приседания','Выпады','Жим ногами'],
      'quads-right':['Приседания','Выпады','Жим ногами'],
      'calves-left':['Подъёмы на носки стоя','Подъёмы сидя'],
      'calves-right':['Подъёмы на носки стоя','Подъёмы сидя'],
      traps:['Шраги','Тяга к подбородку'],
      'rear-delts-left':['Обратная разводка','Тяга к лицу'],
      'rear-delts-right':['Обратная разводка','Тяга к лицу'],
      'lats-left':['Тяга блока','Тяга в наклоне'],
      'lats-right':['Тяга блока','Тяга в наклоне'],
      'triceps-left':['Французский жим','Разгибания на блоке'],
      'triceps-right':['Французский жим','Разгибания на блоке'],
      erectors:['Гиперэкстензия','Тяга с пола'],
      'glutes-left':['Ягодичный мост','Румынская тяга'],
      'glutes-right':['Ягодичный мост','Румынская тяга'],
      'hams-left':['Сгибания ног лёжа','Тяга румынская'],
      'hams-right':['Сгибания ног лёжа','Тяга румынская'],
      'calves-back-left':['Подъёмы на носки стоя','Ослиные подъёмы'],
      'calves-back-right':['Подъёмы на носки стоя','Ослиные подъёмы'],
    };

    // ===== Группы мышц =====
    const GROUPS = {
      abs: ["abs"],
      chest: ["chest"],
      biceps: ["biceps-left","biceps-right"],
      delts: ["delts-left","delts-right"],
      forearm: ["forearm-left","forearm-right"],
      obliques: ["obliques-left","obliques-right"],
      quads: ["quads-left","quads-right"],
      calves: ["calves-left","calves-right","calves-back-left","calves-back-right"],
      triceps: ["triceps-left","triceps-right"],
      rearDelts: ["rear-delts-left","rear-delts-right"],
      lats: ["lats-left","lats-right"],
      glutes: ["glutes-left","glutes-right"],
      hams: ["hams-left","hams-right"],
      traps: ["traps"],
      erectors: ["erectors"]
    };

    function findGroup(id){
      for (let key in GROUPS){
        if (GROUPS[key].includes(id)) return GROUPS[key];
      }
      return [id];
    }

    function attachHandlers(obj){
      obj.addEventListener("load", () => {
        const svgDoc = obj.contentDocument || obj.getSVGDocument();
        if (!svgDoc) return;

        const style = svgDoc.createElement("style");
        style.textContent = `
          .muscle { cursor: pointer; transition: fill .3s, stroke .3s; }
          .muscle.active { fill: rgba(139,92,246,0.55); stroke:#8b5cf6; stroke-width:2; }
          .muscle-test { fill:red !important; opacity:0.5; }
        `;
        const svgRoot = svgDoc.querySelector("svg");
        if (svgRoot) svgRoot.appendChild(style);

        Object.keys(DB).forEach(id => {
          const el = svgDoc.getElementById(id);
          if (el) el.classList.add('muscle');
        });

        svgDoc.querySelectorAll("path").forEach(el => {
          el.addEventListener("pointerdown", () => {
            svgDoc.querySelectorAll(".muscle.active").forEach(m => m.classList.remove("active","muscle-test"));

            if (debugMode) {
              el.classList.add("muscle-test");
              console.log(`Мышца: ${el.id}`);
              return;
            }

            if (el.id && DB[el.id]) {
              const groupIds = findGroup(el.id);
              groupIds.forEach(gid => {
                const g = svgDoc.getElementById(gid);
                if (g) g.classList.add("active");
              });

              const list = (DB[groupIds[0]] && DB[groupIds[0]].length) ? DB[groupIds[0]] : ['Нет упражнений'];
              info.innerHTML = `<h3>${humanName(groupIds[0])}</h3><ul>${list.map(x=>`<li>${x}</li>`).join('')}</ul>`;
            }
          });
        });
      });
    }

    attachHandlers(document.getElementById("svgFront"));
    attachHandlers(document.getElementById("svgBack"));

    function humanName(id){
      const map = {
        chest:"Грудь", abs:"Пресс",
        "biceps-left":"Бицепс", "biceps-right":"Бицепс",
        "delts-left":"Дельта", "delts-right":"Дельта",
        "forearm-left":"Предплечье", "forearm-right":"Предплечье",
        "obliques-left":"Косые", "obliques-right":"Косые",
        "quads-left":"Квадрицепс", "quads-right":"Квадрицепс",
        "calves-left":"Икры", "calves-right":"Икры",
        traps:"Трапеции",
        "rear-delts-left":"Задняя дельта", "rear-delts-right":"Задняя дельта",
        "lats-left":"Широчайшие", "lats-right":"Широчайшие",
        "triceps-left":"Трицепс", "triceps-right":"Трицепс",
        erectors:"Разгибатели спины",
        "glutes-left":"Ягодицы", "glutes-right":"Ягодицы",
        "hams-left":"Бицепс бедра", "hams-right":"Бицепс бедра",
        "calves-back-left":"Икры", "calves-back-right":"Икры"
      };
      return map[id] || id || "Без id";
    }
  </script>
</body>
</html>
