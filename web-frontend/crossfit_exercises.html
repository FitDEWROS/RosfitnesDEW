<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RosApp — Кроссфит упражнения</title>

  <!-- 🧩 Шрифты и общий стиль -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
</head>

<body class="page-crossfit">
  <div class="wrap">

    <!-- 🔙 Шапка -->
    <header class="cf-header">
      <button id="backBtn" class="nav-btn">← Назад</button>
      <div class="brand-mini">
        <lottie-player src="https://assets4.lottiefiles.com/packages/lf20_q5pk6p1k.json" background="transparent" speed="1" loop autoplay></lottie-player>
        <span class="app-title">RosApp</span>
      </div>
    </header>

    <!-- 🏋️ Основной контент -->
    <main class="cf-main" id="exerciseList" aria-live="polite">
      <!-- Карточки упражнений появятся через JS -->
    </main>

    <!-- ⚙️ Футер -->
    <footer class="cf-footer">
      RosApp — Кроссфит: упражнения
    </footer>
  </div>

  <script>
    /* === 🌗 Применяем тему === */
    (function() {
      const theme = localStorage.getItem("theme") || "dark";
      document.documentElement.classList.toggle("light", theme === "light");
    })();

    /* === 🏋️ Данные упражнений === */
    const exercises = [
      { name: "Бёрпи", desc: "Полное упражнение на всё тело: прыжок, планка, отжимание." },
      { name: "Трастеры", desc: "Комбинация приседания и жима штанги вверх." },
      { name: "Гребля", desc: "Кардио-нагрузка на всё тело с акцентом на ноги и спину." },
      { name: "Прыжки на тумбу", desc: "Развивают силу ног и взрывную мощь." },
      { name: "Подтягивания", desc: "Классическое упражнение для спины и рук." },
      { name: "Отжимания в стойке на руках", desc: "Развитие плечевого пояса и равновесия." },
      { name: "Становая тяга", desc: "Базовое упражнение для спины, ног и хвата." },
      { name: "Спринт", desc: "Высокоинтенсивное упражнение на выносливость." },
      { name: "Русские скручивания", desc: "Развитие мышц кора и косых мышц живота." }
    ];

    /* === 🧱 Отрисовка карточек === */
    const list = document.getElementById("exerciseList");
    exercises.forEach(ex => {
      const card = document.createElement("div");
      card.className = "exercise-card";
      card.innerHTML = `
        <h3>${ex.name}</h3>
        <p>${ex.desc}</p>
      `;
      list.appendChild(card);
    });

    /* === 🔙 Кнопка Назад === */
    document.getElementById("backBtn").addEventListener("click", () => {
      window.location.href = "index.html";
    });

    /* === 📱 Анимация появления === */
    document.querySelectorAll(".exercise-card").forEach((card, i) => {
      card.style.opacity = 0;
      setTimeout(() => {
        card.style.transition = "opacity 0.4s ease, transform 0.4s ease";
        card.style.opacity = 1;
        card.style.transform = "translateY(0)";
      }, 80 * i);
    });
  </script>
</body>
</html>
