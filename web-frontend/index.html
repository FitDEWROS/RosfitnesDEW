<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark light" />
  <title>RosApp — Telegram WebApp</title>

  <!-- Fonts & Styles -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />

  <!-- Telegram SDK + env + app -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="env.js"></script>
  <script defer src="app.js"></script>
</head>
<body>
  <div class="wrap">
    <header class="header">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg class="barbell-lift" width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Человечек -->
            <circle cx="32" cy="14" r="6" fill="currentColor"/> <!-- Голова -->
            <rect x="30" y="20" width="4" height="14" fill="currentColor"/> <!-- Туловище -->
            <!-- Ноги -->
            <line x1="30" y1="34" x2="26" y2="48" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
            <line x1="34" y1="34" x2="38" y2="48" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
            
            <!-- Группа: руки + штанга -->
            <g class="bar">
              <!-- Руки -->
              <line x1="30" y1="24" x2="20" y2="36" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
              <line x1="34" y1="24" x2="44" y2="36" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
              <!-- Штанга -->
              <rect x="8" y="36" width="48" height="3" rx="1.5" fill="currentColor"/>
              <rect x="4" y="28" width="4" height="20" rx="2" fill="currentColor"/>
              <rect x="56" y="28" width="4" height="20" rx="2" fill="currentColor"/>
            </g>
          </svg>



        </div>
        <div>
          <h1 class="app-title">RosApp</h1>
          <p class="muted">Твой путь к форме начинается здесь</p>
        </div>
      </div>

      <div class="user" id="userbox">
        <div id="greeting" class="greeting">Привет!</div>
        <div class="user-row">
          <div class="badge" id="tariff">Тариф: неизвестно</div>
          <button id="themeToggle" class="theme-btn" title="Сменить тему" aria-label="Сменить тему">🌙</button>
        </div>
      </div>
    </header>

    <main>
      <section class="grid" id="tiles" aria-live="polite">
        <!-- Плитки добавляются из app.js -->
      </section>
    </main>

    <footer class="footer">
      <!-- Можно оставить пустым или вставить что-то своё -->
    </footer>
  </div>

  <noscript>Для работы приложения нужен включённый JavaScript.</noscript>
</body>
</html>
