<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark light" />
  <title>RosApp — Telegram WebApp</title>

  <!-- Fonts & Styles -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />

  <!-- Telegram SDK + env + app -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="env.js"></script>
  <script defer src="app.js"></script>

  <!-- Lottie Player -->
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
</head>
<body>
  <div class="wrap">
    <header class="header">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <!-- Lottie-анимация -->
          <lottie-player
            src="dumbell animation.json"
            background="transparent"
            speed="1"
            style="width: 64px; height: 64px;"
            loop
            autoplay>
          </lottie-player>
        </div>
        <div>
          <h1 class="app-title">RosApp</h1>
          <p class="muted">Твой путь к форме начинается здесь</p>
        </div>
      </div>

      <div class="user" id="userbox">
        <div id="greeting" class="greeting">Привет!</div>
        <div class="user-row">
          <div class="badge" id="tariff">Тариф: неизвестно</div>
          <!-- Кнопка профиль -->
          <button id="profileBtn" class="theme-btn" title="Мой профиль" aria-label="Мой профиль">👤</button>
          <!-- Кнопка тема -->
          <button id="themeToggle" class="theme-btn" title="Сменить тему" aria-label="Сменить тему">🌙</button>
        </div>
      </div>
    </header>

    <main>
      <section class="grid" id="tiles" aria-live="polite">
        <!-- Плитки добавляются из app.js -->
      </section>
    </main>

    <footer class="footer">@Fitdew_bot</footer>
  </div>

  <!-- 🔹 Модальное окно профиля -->
  <div id="profileModal" class="modal hidden">
    <div class="modal-content">
      <span class="close" id="closeProfile">&times;</span>
      <div class="profile-card">
        <!-- Фото Telegram -->
        <img id="profilePhoto" class="profile-photo" src="default-avatar.png" alt="Аватар">
        <h2 id="profileName">Имя Фамилия</h2>
        <p id="profileUsername">@username</p>
        <p>ID Telegram: <span id="profileId"></span></p>
        <p>Тариф: <span id="profileTariff"></span></p>
      </div>
    </div>
  </div>

  <noscript>Для работы приложения нужен включённый JavaScript.</noscript>

  <script>
    // === Модалка профиля ===
    const profileBtn = document.getElementById("profileBtn");
    const profileModal = document.getElementById("profileModal");
    const closeProfile = document.getElementById("closeProfile");

    profileBtn.addEventListener("click", () => {
      profileModal.classList.remove("hidden");
    });

    closeProfile.addEventListener("click", () => {
      profileModal.classList.add("hidden");
    });

    window.addEventListener("click", (e) => {
      if (e.target === profileModal) {
        profileModal.classList.add("hidden");
      }
    });
  </script>
</body>
</html>
