<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark light" />
  <title>RosApp — Telegram WebApp</title>

  <!-- Fonts & Styles -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />

  <!-- Telegram SDK + env + app -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="env.js"></script>
  <script defer src="app.js"></script>
</head>
<body>
  <div class="wrap">
    <header class="header">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg class="barbell" width="40" height="40" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Штанга -->
            <rect x="10" y="28" width="44" height="8" rx="2" fill="currentColor"/>
            <rect x="6" y="22" width="4" height="20" rx="2" fill="currentColor"/>
            <rect x="54" y="22" width="4" height="20" rx="2" fill="currentColor"/>
            <!-- Человечек -->
            <circle cx="32" cy="16" r="6" fill="currentColor"/>
            <rect x="30" y="22" width="4" height="18" fill="currentColor"/>
          </svg>
        </div>
        <div>
          <h1 class="app-title">RosApp</h1>
          <p class="muted">Твой путь к форме начинается здесь</p>
        </div>
      </div>

      <div class="user" id="userbox">
        <div id="greeting" class="greeting">Привет!</div>
        <div class="user-row">
          <div class="badge" id="tariff">Тариф: неизвестно</div>
          <button id="themeToggle" class="theme-btn" title="Сменить тему" aria-label="Сменить тему">🌙</button>
        </div>
      </div>
    </header>

    <main>
      <section class="grid" id="tiles" aria-live="polite">
        <!-- Плитки добавляются из app.js -->
      </section>
    </main>

    <footer class="footer">
      <span>@Fitdew_bot</span>
    </footer>
  </div>

  <noscript>Для работы приложения нужен включённый JavaScript.</noscript>
</body>
</html>
