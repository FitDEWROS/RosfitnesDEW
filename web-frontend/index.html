<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RosApp — Telegram WebApp</title>

  <!-- ⚙️ Сбрасываем телеграмовскую тему -->
  <script>
    (function() {
      const savedTheme = localStorage.getItem("theme") || "dark";
      const isLight = savedTheme === "light";
      if (isLight) document.documentElement.classList.add("light");
      else document.documentElement.classList.remove("light");

      const root = document.documentElement.style;
      if (isLight) {
        root.setProperty("--bg", "#f5f7fa");
        root.setProperty("--text", "#111113");
        root.setProperty("--card", "#ffffff");
        root.setProperty("--card-border", "rgba(0,0,0,0.1)");
        root.setProperty("--accent", "#3b82f6");
      } else {
        root.setProperty("--bg", "#111113");
        root.setProperty("--text", "#ffffff");
        root.setProperty("--card", "rgba(255,255,255,0.05)");
        root.setProperty("--card-border", "rgba(255,255,255,0.1)");
        root.setProperty("--accent", "#8b5cf6");
      }

      document.addEventListener("DOMContentLoaded", () => {
        const themeToggle = document.getElementById("themeToggle");
        if (themeToggle) themeToggle.textContent = isLight ? "🌙" : "☀️";
      });
    })();
  </script>

  <style>
    :root {
      --tg-theme-bg-color: unset !important;
      --tg-theme-text-color: unset !important;
      --tg-theme-hint-color: unset !important;
      --tg-theme-link-color: unset !important;
      --tg-theme-button-color: unset !important;
      --tg-theme-button-text-color: unset !important;
    }

    html, body {
      background-color: var(--bg) !important;
      color: var(--text) !important;
    }

    /* ================================
       🔀 Тумблер режима (Зал / Кроссфит)
    ===================================*/
    .mode-toggle {
      display: flex;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      overflow: hidden;
      width: fit-content;
    }

    .mode-btn {
      flex: 1;
      background: transparent;
      border: none;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--text);
      transition: background 0.3s, color 0.3s;
    }

    .mode-btn.active {
      background: var(--accent);
      color: #fff;
    }
  </style>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="env.js"></script>
  <script defer src="app.js"></script>
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
</head>

<body>
  <div class="wrap">
    <header class="header">
      <div class="brand">
        <h1 class="app-title">RosApp</h1>
        <div class="brand-row">
          <div class="logo" aria-hidden="true">
            <lottie-player
              src="dumbell animation.json"
              background="transparent"
              speed="1"
              style="width: 64px; height: 64px;"
              loop autoplay>
            </lottie-player>
          </div>
          <p class="muted slogan">Твой путь к форме начинается здесь</p>
        </div>
      </div>

      <div class="user" id="userbox">
        <div id="greeting" class="greeting">Привет!</div>
        <div class="user-row">
          <div class="badge" id="tariff">Тариф: неизвестно</div>

          <!-- Кнопка профиль -->
          <button id="profileBtn" class="theme-btn" title="Мой профиль" aria-label="Мой профиль">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
              <circle cx="12" cy="8" r="4"/>
              <path d="M12 14c-4.4 0-8 2.2-8 5v1h16v-1c0-2.8-3.6-5-8-5z"/>
            </svg>
          </button>

          <!-- 🔀 Новый тумблер режима -->
          <div id="modeToggle" class="mode-toggle">
            <button data-mode="gym" class="mode-btn active">Зал</button>
            <button data-mode="crossfit" class="mode-btn">Кроссфит</button>
          </div>

          <!-- Кнопка темы -->
          <button id="themeToggle" class="theme-btn" title="Сменить тему" aria-label="Сменить тему">🌙</button>
        </div>
      </div>
    </header>

    <main>
      <section class="grid" id="tiles" aria-live="polite">
        <!-- Плитки добавляются из app.js -->
      </section>
    </main>
  </div>

  <!-- 🔹 Модальное окно профиля -->
  <div id="profileModal" class="modal hidden">
    <div class="modal-content">
      <span class="close" id="closeProfile">&times;</span>
      <div class="profile-card">
        <img id="profilePhoto" class="profile-photo" src="default-avatar.png" alt="Аватар">
        <h2 id="profileName">Имя Фамилия</h2>
        <p id="profileUsername">@username</p>
        <p>ID Telegram: <span id="profileId"></span></p>
        <p>Тариф: <span id="profileTariff"></span></p>
      </div>
    </div>
  </div>

  <noscript>Для работы приложения нужен включённый JavaScript.</noscript>

  <script>
    // === Модалка профиля ===
    const profileBtn = document.getElementById("profileBtn");
    const profileModal = document.getElementById("profileModal");
    const closeProfile = document.getElementById("closeProfile");

    profileBtn.addEventListener("click", () => profileModal.classList.remove("hidden"));
    closeProfile.addEventListener("click", () => profileModal.classList.add("hidden"));
    window.addEventListener("click", (e) => {
      if (e.target === profileModal) profileModal.classList.add("hidden");
    });

    // === Переключение темы ===
    function applyTheme(theme) {
      if (theme === "light") document.documentElement.classList.add("light");
      else document.documentElement.classList.remove("light");
    }

    const themeToggle = document.getElementById("themeToggle");
    if (themeToggle) {
      themeToggle.addEventListener("click", () => {
        const newTheme = document.documentElement.classList.contains("light") ? "dark" : "light";
        localStorage.setItem("theme", newTheme);
        applyTheme(newTheme);
        themeToggle.textContent = newTheme === "light" ? "🌙" : "☀️";
      });
    }

    // === 🔀 Новый тумблер режима ===
    document.addEventListener("DOMContentLoaded", async () => {
      const modeBtns = document.querySelectorAll(".mode-btn");
      const savedMode = localStorage.getItem("training_mode") || "gym";

      // Активируем кнопку режима
      modeBtns.forEach(btn => {
        btn.classList.toggle("active", btn.dataset.mode === savedMode);
      });

      // Обработчик переключения
      modeBtns.forEach(btn => {
        btn.addEventListener("click", async () => {
          const newMode = btn.dataset.mode;
          localStorage.setItem("training_mode", newMode);

          modeBtns.forEach(b => b.classList.remove("active"));
          btn.classList.add("active");

          const tg = window.Telegram?.WebApp?.initDataUnsafe?.user;
          if (tg?.id) {
            try {
              await fetch("/api/mode", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ tg_id: tg.id, mode: newMode })
              });
            } catch (err) {
              console.warn("⚠ Ошибка при обновлении режима:", err);
            }
          }

          // Перерисовываем плитки под выбранный режим
          const tariff = document.getElementById("tariff").textContent.replace("Тариф: ", "") || "Базовый";
          if (window.renderTilesByTariff) {
            window.renderTilesByTariff(tariff);
          }
        });
      });
    });
  </script>
</body>
</html>
